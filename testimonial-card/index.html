<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GreatFrontEnd Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />

    <!-- Tailwind CDN allows you to use Tailwind classes immediately in your HTML without any installation steps. 
      If you're not using Tailwind, you may delete the <script> -->
    <!-- Get started on Tailwind: https://tailwindcss.com/docs/installation/play-cdn -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="icon" href="img/favicon.ico" sizes="any" />
  </head>
  <body class="flex justify-center bg-gray-200">
    <article class="flex flex-col p-6 w-[340px] mt-[200px] m-auto gap-4 bg-white rounded-lg shadow-md">
      <figure class="flex gap-4">
        <img class="w-12 h-12" src="img/profile-thumbnail.png" alt="User Avatar" />
        <figcaption class="flex-col overflow-hidden">
          <h1 class="text-lg font-semibold overflow-hidden text-ellipsis whitespace-nowrap">Sarah Dole</h1>
          <h2 class="text-sm text-neutral-600 overflow-hidden text-ellipsis whitespace-nowrap">@sarahdole</h2>
        </figcaption>
      </figure>
        <p class="text-base text-neutral-600 line-clamp-5">
          I've been searching for high-quality abstract images for my design projects, 
          and I'm thrilled to have found this platform. The variety and depth of creativity are astounding! 
        </p>
    </article>
    <script src="js/index.js"></script>
  </body>
</html>
